name: Daily A-Share AI Analysis

on:
  schedule:
    - cron: '0 1 * * *' # 北京时间 09:00
    - cron: '0 5 * * *' # 北京时间 13:00
    - cron: '0 7 * * *' # 北京时间 15:00
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AI analysis
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          WATCHLIST: ${{ secrets.WATCHLIST }}
          WATCHLIST_FILE: watchlist.txt
          DESKTOP_OUTPUT: "false"
          OUTPUT_DIR: outputs
          DATA_USE_TUSHARE: ${{ secrets.DATA_USE_TUSHARE }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          NOTIFY_PROVIDER: ${{ secrets.NOTIFY_PROVIDER }}
          NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
        run: python main.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: a-share-ai-output
          path: |
            outputs/latest_dashboard.html
            outputs/latest_dashboard.md
            outputs/latest_daily_report.md
            outputs/picked_stocks.csv
            outputs/**/daily_report.md
            outputs/**/market_summary.json
            outputs/**/backtest_summary.json
